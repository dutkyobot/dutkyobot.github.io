<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>타임테이블 유튜브 플레이어</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      overflow: auto;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 16px;
      gap: 16px;
      box-sizing: border-box;
    }

    .panel {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.6);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .left {
      width: 35%;
      min-width: 320px;
      gap: 10px;
    }

    .right {
      flex: 1;
      gap: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.75);
      box-sizing: border-box;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ffffffcc;
      transition: 0.2s;
      width: 100%;
      margin-top: 6px;
    }

    button:active {
      transform: scale(0.98);
    }

    .playlist {
      flex: 1;
      overflow-y: auto;
      margin-top: 8px;
    }

    .item {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .now {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      padding: 10px;
    }

    .playerWrap {
      position: relative;
      width: 100%;
      height: 420px;
      border-radius: 16px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 10;
      cursor: default;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .controls button {
      width: auto;
      flex: 1;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        height: auto;
      }

      .left {
        width: 100%;
        min-width: unset;
      }

      .playerWrap {
        height: 260px;
      }
    }
  </style>
</head>

<body onload="loadState()">

<div class="container">

  <div class="panel left">
    <input id="videoId" placeholder="유튜브 영상 ID" oninput="saveState()" />
    <textarea id="timeline" rows="10" placeholder="타임테이블 붙여넣기" oninput="saveState()"></textarea>
    <button onclick="generatePlaylist()">플레이리스트 생성</button>

    <div class="playlist" id="playlist"></div>
  </div>

  <div class="panel right">
    <div class="now" id="nowPlaying">재생 중 없음</div>

    <div class="playerWrap">
      <iframe id="player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
      <div class="overlay"></div>
    </div>

    <div class="controls">
      <button onclick="prev()">이전</button>
      <button onclick="next()">다음</button>
    </div>
  </div>

</div>

<script>
let playlist = [];
let current = 0;

function syncState() {
  const state = {
    videoId: document.getElementById('videoId').value,
    timeline: document.getElementById('timeline').value,
    current
  };

  const encoded = encodeURIComponent(JSON.stringify(state));
  localStorage.setItem('state', encoded);
  sessionStorage.setItem('state', encoded);
  location.hash = encoded;
}

function restoreState() {
  let raw = location.hash?.slice(1) || sessionStorage.getItem('state') || localStorage.getItem('state');
  if (!raw) return;

  try {
    const state = JSON.parse(decodeURIComponent(raw));
    if (state.videoId) document.getElementById('videoId').value = state.videoId;
    if (state.timeline) document.getElementById('timeline').value = state.timeline;
    if (typeof state.current === 'number') current = state.current;
  } catch (e) {}
}

function saveState() {
  syncState();
}

function loadState() {
  restoreState();
}

function parseTime(t) {
  const p = t.split(':').map(Number);
  if (p.length === 2) return p[0] * 60 + p[1];
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  return 0;
}

function generatePlaylist() {
  const id = document.getElementById('videoId').value.trim();
  const text = document.getElementById('timeline').value;

  playlist = [];

  text.split('\n').forEach(line => {
    const m = line.trim().match(/(\d{1,2}:\d{2}(?::\d{2})?)\s*(.*)/);
    if (m) {
      playlist.push({
        time: parseTime(m[1]),
        title: m[2] || '제목 없음',
        videoId: id
      });
    }
  });

  playlist.sort((a,b) => a.time - b.time);
  current = 0;

  renderList();
  playCurrent();
  syncState();
}

function renderList() {
  const el = document.getElementById('playlist');
  el.innerHTML = '';

  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `${item.title} <span>${item.time}s</span>`;
    div.onclick = () => {
      current = i;
      playCurrent();
      syncState();
    };
    el.appendChild(div);
  });
}

function updateNowPlaying() {
  const el = document.getElementById('nowPlaying');
  if (playlist[current]) el.textContent = playlist[current].title;
}

function playCurrent() {
  if (!playlist[current]) return;

  const item = playlist[current];
  document.getElementById('player').src =
    `https://www.youtube.com/embed/${item.videoId}?controls=0&start=${item.time}&autoplay=1`;

  updateNowPlaying();
  syncState();
}

function next() {
  if (current < playlist.length - 1) {
    current++;
    playCurrent();
  }
}

function prev() {
  if (current > 0) {
    current--;
    playCurrent();
  }
}
</script>

</body>
</html>
